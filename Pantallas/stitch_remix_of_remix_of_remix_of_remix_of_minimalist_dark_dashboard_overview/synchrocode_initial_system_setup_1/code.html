<!DOCTYPE html>
<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SynchroCode Initial System Setup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2e75b8", // Blue #2E75B6
                        "primary-hover": "#25629a",
                        "zinc-950": "#09090b",
                        "zinc-900": "#18181b",
                        "zinc-800": "#27272a",
                        "zinc-700": "#3f3f46",
                        "zinc-600": "#52525b",
                        "zinc-500": "#71717a",
                        "zinc-400": "#a1a1aa",
                        "zinc-100": "#f4f4f5",
                        "zinc-50": "#fafafa",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.375rem",
                        "md": "0.375rem", // rounded-md
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-zinc-950 min-h-screen w-full flex items-center justify-center font-display antialiased text-zinc-50 p-4">
<div class="w-full max-w-[460px] bg-zinc-900 rounded-md shadow-lg border border-zinc-800 overflow-hidden">
<div class="pt-8 px-8 pb-4 flex flex-col items-center text-center">
<div class="inline-flex items-center rounded-full border border-orange-900 bg-orange-900/20 px-2.5 py-0.5 text-xs font-semibold text-orange-400 transition-colors mb-6">
                Configuración inicial
            </div>
<h1 class="text-2xl font-bold tracking-tight text-white mb-2">
                Crear cuenta de administrador
            </h1>
<p class="text-sm text-zinc-400">
                Esta cuenta tendrá acceso completo al sistema.
            </p>
</div>
<div class="px-8 pb-8 pt-2">
<form class="space-y-4" onsubmit="event.preventDefault();">
<div class="space-y-2">
<label class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70 text-zinc-100" for="name">
                        Nombre completo
                    </label>
<input class="flex h-10 w-full rounded-md border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm text-zinc-100 placeholder:text-zinc-500 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-zinc-950 disabled:cursor-not-allowed disabled:opacity-50" id="name" placeholder="Ej: Carlos Mendoza" type="text"/>
</div>
<div class="space-y-2">
<label class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70 text-zinc-100" for="email">
                        Correo electrónico
                    </label>
<input class="flex h-10 w-full rounded-md border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm text-zinc-100 placeholder:text-zinc-500 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-zinc-950 disabled:cursor-not-allowed disabled:opacity-50" id="email" placeholder="Ej: admin@empresa.com" type="email"/>
</div>
<div class="space-y-2">
<label class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70 text-zinc-100" for="password">
                        Contraseña
                    </label>
<div class="relative">
<input class="flex h-10 w-full rounded-md border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm text-zinc-100 placeholder:text-zinc-500 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-zinc-950 disabled:cursor-not-allowed disabled:opacity-50" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-zinc-300" type="button">
<span class="material-symbols-outlined text-[18px]">visibility_off</span>
</button>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between text-xs">
<span class="text-zinc-400">Fortaleza de contraseña</span>
<span class="text-emerald-500 font-medium">Fuerte</span>
</div>
<div class="flex h-1.5 w-full overflow-hidden rounded-full bg-zinc-800 gap-1">
<div class="h-full w-1/4 bg-emerald-500 rounded-full"></div>
<div class="h-full w-1/4 bg-emerald-500 rounded-full"></div>
<div class="h-full w-1/4 bg-emerald-500 rounded-full"></div>
<div class="h-full w-1/4 bg-emerald-500/30 rounded-full"></div>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70 text-zinc-100" for="confirm-password">
                        Confirmar contraseña
                    </label>
<input class="flex h-10 w-full rounded-md border border-zinc-700 bg-zinc-950 px-3 py-2 text-sm text-zinc-100 placeholder:text-zinc-500 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-zinc-950 disabled:cursor-not-allowed disabled:opacity-50" id="confirm-password" placeholder="••••••••" type="password"/>
</div>
<div class="pt-4">
<button class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium ring-offset-zinc-950 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-primary text-white hover:bg-primary-hover h-10 w-full shadow-sm">
                        Crear cuenta y continuar
                    </button>
</div>
</form>
</div>
</div>

</body></html>
