<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2e77b8",
                        "background-light": "#f6f7f8",
                        "background-dark": "#13191f",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Nuevo Proyecto - SynchroCode</title>
</head>
<body class="bg-slate-950 font-display min-h-screen flex items-center justify-center p-4">
<!-- Modal Overlay Backdrop -->
<div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
<!-- Modal Container -->
<div class="bg-[#1e293b] w-full max-w-[550px] rounded-lg shadow-2xl overflow-hidden border border-slate-700">
<!-- Modal Header -->
<div class="px-6 py-4 border-b border-slate-700 flex justify-between items-center">
<h2 class="text-xl font-bold text-slate-100">Nuevo Proyecto</h2>
<button class="text-slate-400 hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Content (Form) -->
<div class="p-6 space-y-6">
<!-- Project Name -->
<div class="space-y-2">
<label class="text-sm font-medium text-slate-300">
                        Nombre del proyecto
                    </label>
<input class="w-full px-3 py-2 rounded-lg border border-slate-700 bg-slate-900/50 text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-500" placeholder="Ej: Portal de clientes v2" type="text"/>
</div>
<!-- Description -->
<div class="space-y-2">
<label class="text-sm font-medium text-slate-300">
                        Descripción
                    </label>
<textarea class="w-full px-3 py-2 rounded-lg border border-slate-700 bg-slate-900/50 text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-500" placeholder="Objetivo y alcance del proyecto"></textarea>
</div>
<!-- Date Grid -->
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="text-sm font-medium text-slate-300">
                            Fecha de inicio
                        </label>
<div class="relative">
<input class="w-full px-3 py-2 rounded-lg border border-slate-700 bg-slate-900/50 text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-500" placeholder="DD/MM/YYYY" type="text"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">calendar_today</span>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-medium text-slate-300">
                            Fecha de fin estimada
                        </label>
<div class="relative">
<input class="w-full px-3 py-2 rounded-lg border border-slate-700 bg-slate-900/50 text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-500" placeholder="DD/MM/YYYY" type="text"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">event</span>
</div>
</div>
</div>
</div>
<!-- Modal Footer (Actions) -->
<div class="px-6 py-6 space-y-3">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-semibold h-11 rounded-lg transition-colors flex items-center justify-center gap-2">
<span>Guardar</span>
</button>
<button class="w-full bg-transparent border border-slate-700 hover:bg-slate-800 text-slate-300 font-semibold h-11 rounded-lg transition-colors">
                    Cancelar
                </button>
</div>
</div>
</div>
<!-- Background Content Mockup (to show modality) -->
<div aria-hidden="true" class="w-full max-w-5xl mx-auto opacity-20 pointer-events-none">
<div class="flex justify-between items-center mb-8">
<div class="h-8 w-48 bg-slate-800 rounded"></div>
<div class="h-10 w-32 bg-primary rounded"></div>
</div>
<div class="grid grid-cols-3 gap-6">
<div class="h-48 bg-slate-800/50 rounded-lg"></div>
<div class="h-48 bg-slate-800/50 rounded-lg"></div>
<div class="h-48 bg-slate-800/50 rounded-lg"></div>
</div>
</div>
</body></html>
