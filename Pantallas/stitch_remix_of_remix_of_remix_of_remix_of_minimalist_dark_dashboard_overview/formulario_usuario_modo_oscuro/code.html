<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SynchroCode User Form Modal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2e75b8", 
                        "background-light": "#f6f7f8",
                        "background-dark": "#13191f",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px", "md": "0.375rem"},
                },
            },
        }
    </script>
</head>
<body class="bg-[#09090b] font-display min-h-screen flex items-center justify-center p-4 relative">
<div aria-hidden="true" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm transition-opacity z-10"></div>
<div class="relative w-full max-w-[500px] transform overflow-hidden rounded-xl bg-[#18181b] p-6 text-left shadow-2xl transition-all border border-[#27272a] z-20 m-auto">
<div class="flex items-center justify-between mb-6">
<h2 class="text-2xl font-semibold leading-none tracking-tight text-zinc-50">
                Nuevo Usuario
            </h2>
<button class="text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined text-2xl text-zinc-400 hover:text-zinc-200 transition-colors">close</span>
</button>
</div>
<div class="space-y-5">
<div class="space-y-2">
<label class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70 text-zinc-400" for="fullname">
                    Nombre completo
                </label>
<input class="flex h-10 w-full rounded-md border border-[#27272a] bg-[#09090b] px-3 py-2 text-sm text-zinc-50 placeholder:text-zinc-500 focus:outline-none focus:ring-2 focus:ring-[#2E75B6] disabled:cursor-not-allowed disabled:opacity-50" id="fullname" placeholder="María García" type="text"/>
</div>
<div class="space-y-2">
<label class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70 text-zinc-400" for="email">
                    Correo electrónico
                </label>
<input class="flex h-10 w-full rounded-md border border-[#27272a] bg-[#09090b] px-3 py-2 text-sm text-zinc-50 placeholder:text-zinc-500 focus:outline-none focus:ring-2 focus:ring-[#2E75B6] disabled:cursor-not-allowed disabled:opacity-50" id="email" placeholder="maria@empresa.com" type="email"/>
</div>
<div class="space-y-2">
<label class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70 text-zinc-400" for="role">
                    Rol asignado
                </label>
<div class="relative">
<select class="flex h-10 w-full items-center justify-between rounded-md border border-[#27272a] bg-[#09090b] px-3 py-2 text-sm text-zinc-50 focus:outline-none focus:ring-2 focus:ring-[#2E75B6] disabled:cursor-not-allowed disabled:opacity-50 appearance-none" id="role">
<option disabled="" selected="" value="">Selecciona un rol</option>
<option value="admin">Administrador</option>
<option value="manager">Gerente</option>
<option value="user">Usuario</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-slate-500">
<span class="material-symbols-outlined text-lg text-zinc-400">expand_more</span>
</div>
</div>
</div>
<div class="flex items-start gap-2 rounded-md bg-[#2E75B6]/10 p-3 text-sm text-[#2E75B6]">
<span class="material-symbols-outlined text-lg shrink-0 mt-0.5">info</span>
<p class="leading-relaxed text-zinc-400">El usuario recibirá un correo de activación.</p>
</div>
</div>
<div class="mt-8 flex flex-col gap-3">
<button class="inline-flex h-10 w-full items-center justify-center rounded-md bg-[#2E75B6] px-4 py-2 text-sm font-medium text-white transition-colors hover:bg-[#2E75B6]/90 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[#2E75B6] disabled:pointer-events-none disabled:opacity-50">
                Guardar
            </button>
<button class="inline-flex h-10 w-full items-center justify-center rounded-md border border-[#27272a] bg-[#18181b] px-4 py-2 text-sm font-medium text-zinc-300 transition-colors hover:bg-[#27272a] hover:text-zinc-50 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-zinc-400 disabled:pointer-events-none disabled:opacity-50">
                Cancelar
            </button>
</div>
</div>
</body></html>
