<!DOCTYPE html>
<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SynchroCode - Recuperar contraseña</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2E75B6",
                        "dark-bg": "#09090b",
                        "dark-card": "#18181b",
                        "zinc-50": "#fafafa",
                        "zinc-100": "#f4f4f5",
                        "zinc-200": "#e4e4e7",
                        "zinc-300": "#d4d4d8",
                        "zinc-400": "#a1a1aa",
                        "zinc-500": "#71717a",
                        "zinc-600": "#52525b",
                        "zinc-700": "#3f3f46",
                        "zinc-800": "#27272a",
                        "zinc-900": "#18181b",
                        "zinc-950": "#09090b",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "md": "0.375rem",
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-dark-bg font-display text-zinc-100 antialiased h-screen w-full flex items-center justify-center overflow-hidden">
<div class="w-full max-w-[380px] px-4">
<div class="bg-dark-card rounded-md shadow-lg border border-zinc-800 p-8">
<a class="inline-flex items-center gap-1.5 text-sm font-medium text-zinc-400 hover:text-zinc-50 mb-6 transition-colors duration-200" href="#">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
                Volver al login
            </a>
<div class="space-y-2 mb-6">
<h1 class="text-2xl font-bold tracking-tight text-zinc-50">Recuperar contraseña</h1>
<p class="text-sm text-zinc-400 leading-relaxed">
                    Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.
                </p>
</div>
<form class="space-y-6" onsubmit="event.preventDefault();">
<div class="space-y-2">
<label class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70 text-zinc-200" for="email">
                        Correo electrónico
                    </label>
<div class="relative">
<input class="flex h-10 w-full rounded-md border border-zinc-700 bg-zinc-900 px-3 py-2 text-sm text-zinc-100 placeholder:text-zinc-500 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-dark-card disabled:cursor-not-allowed disabled:opacity-50 transition-all duration-200" id="email" placeholder="you@example.com" type="email"/>
</div>
</div>
<button class="inline-flex h-10 w-full items-center justify-center whitespace-nowrap rounded-md bg-primary px-4 py-2 text-sm font-medium text-white shadow hover:bg-primary/90 focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50 transition-colors">
                    Enviar enlace
                </button>
</form>
</div>
<div class="mt-6 text-center text-xs text-zinc-400">
<p>
                ¿No tienes una cuenta? 
                <a class="font-medium text-primary hover:text-primary/80 hover:underline transition-colors" href="#">Regístrate</a>
</p>
</div>
</div>

</body></html>
