<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SynchroCode - New Task</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2E75B6",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body { font-family: 'Public Sans', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display">
<!-- Background Kanban Board Simulation -->
<div class="fixed inset-0 z-0 overflow-hidden opacity-40 grayscale pointer-events-none">
<div class="flex h-full w-full gap-6 p-8">
<div class="flex flex-col w-72 bg-slate-200/50 dark:bg-slate-800/50 rounded-lg p-4 h-fit border border-slate-300 dark:border-slate-700">
<div class="h-4 w-24 bg-slate-300 dark:bg-slate-700 rounded mb-4"></div>
<div class="space-y-3">
<div class="h-24 bg-white dark:bg-slate-900 rounded-md border border-slate-200 dark:border-slate-800"></div>
<div class="h-24 bg-white dark:bg-slate-900 rounded-md border border-slate-200 dark:border-slate-800"></div>
</div>
</div>
<div class="flex flex-col w-72 bg-slate-200/50 dark:bg-slate-800/50 rounded-lg p-4 h-fit border border-slate-300 dark:border-slate-700">
<div class="h-4 w-24 bg-slate-300 dark:bg-slate-700 rounded mb-4"></div>
<div class="space-y-3">
<div class="h-24 bg-white dark:bg-slate-900 rounded-md border border-slate-200 dark:border-slate-800"></div>
</div>
</div>
<div class="flex flex-col w-72 bg-slate-200/50 dark:bg-slate-800/50 rounded-lg p-4 h-fit border border-slate-300 dark:border-slate-700">
<div class="h-4 w-24 bg-slate-300 dark:bg-slate-700 rounded mb-4"></div>
<div class="space-y-3">
<div class="h-24 bg-white dark:bg-slate-900 rounded-md border border-slate-200 dark:border-slate-800"></div>
<div class="h-24 bg-white dark:bg-slate-900 rounded-md border border-slate-200 dark:border-slate-800"></div>
<div class="h-24 bg-white dark:bg-slate-900 rounded-md border border-slate-200 dark:border-slate-800"></div>
</div>
</div>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center backdrop-blur-sm p-4" style="background-color: #F5F5F5;">
<!-- Modal Content (New Task) -->
<div class="w-full max-w-[500px] bg-white dark:bg-slate-900 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-800 overflow-hidden flex flex-col" style="background-color: #FFFFFF; border-color: #CCCCCC;">
<!-- Modal Header -->
<div class="px-6 py-4 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
<h2 class="text-xl font-semibold text-slate-900 dark:text-white">Crear Nueva Tarea</h2>
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Body / Form -->
<div class="px-6 py-5 space-y-5 overflow-y-auto max-h-[80vh]">
<!-- Title Field -->
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" style="color: #444444;">Título</label>
<input class="w-full px-3 py-2 bg-white dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-slate-100 placeholder:text-slate-400 placeholder-[#444444]" placeholder="Título de la tarea" style="border-color: #CCCCCC; color: #444444;" type="text"/>
</div>
<!-- Description Field -->
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" style="color: #444444;">Descripción</label>
<textarea class="w-full px-3 py-2 bg-white dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-slate-100 placeholder:text-slate-400 resize-none placeholder-[#444444]" placeholder="Describe la tarea..." rows="4" style="border-color: #CCCCCC; color: #444444;"></textarea>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Priority Select -->
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" style="color: #444444;">Prioridad</label>
<select class="w-full px-3 py-2 bg-white dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-slate-100 appearance-none placeholder-[#444444]" style="border-color: #CCCCCC; color: #444444;">
<option disabled="" selected="" value="">Seleccionar prioridad</option>
<option value="high">High</option>
<option value="medium">Medium</option>
<option value="low">Low</option>
</select>
</div>
<!-- Assignee Select -->
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" style="color: #444444;">Responsable</label>
<select class="w-full px-3 py-2 bg-white dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-slate-100 appearance-none placeholder-[#444444]" style="border-color: #CCCCCC; color: #444444;">
<option disabled="" selected="" value="">Asignar a...</option>
<option value="1">Alex Rivera</option>
<option value="2">Sarah Chen</option>
<option value="3">Jordan Smith</option>
<option value="4">Unassigned</option>
</select>
</div>
</div>
<!-- Due Date (Simulated Date Picker UI) -->
<div class="space-y-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" style="color: #444444;">Fecha de entrega</label>
<div class="relative">
<input class="w-full pl-10 pr-3 py-2 bg-white dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-slate-100 placeholder:text-slate-400 placeholder-[#444444]" placeholder="Seleccionar fecha" style="border-color: #CCCCCC; color: #444444;" type="text"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">calendar_today</span>
</div>
</div>
<!-- Calendar Widget (Preview/Static) -->
<div class="border border-slate-200 dark:border-slate-800 rounded-xl p-4 bg-slate-50/50 dark:bg-slate-950/50" style="border-color: #CCCCCC; background-color: transparent;">
<div class="flex items-center justify-between mb-4 px-1">
<button class="p-1 hover:bg-slate-200 dark:hover:bg-slate-800 rounded">
<span class="material-symbols-outlined text-[18px]">chevron_left</span>
</button>
<span class="text-sm font-bold text-slate-800 dark:text-slate-200" style="color: #444444;">Octubre 2023</span>
<button class="p-1 hover:bg-slate-200 dark:hover:bg-slate-800 rounded">
<span class="material-symbols-outlined text-[18px]">chevron_right</span>
</button>
</div>
<div class="grid grid-cols-7 gap-y-1"><div class="text-[11px] font-bold text-[#444444] text-center uppercase">D</div><div class="text-[11px] font-bold text-[#444444] text-center uppercase">L</div><div class="text-[11px] font-bold text-[#444444] text-center uppercase">M</div><div class="text-[11px] font-bold text-[#444444] text-center uppercase">M</div><div class="text-[11px] font-bold text-[#444444] text-center uppercase">J</div><div class="text-[11px] font-bold text-[#444444] text-center uppercase">V</div><div class="text-[11px] font-bold text-[#444444] text-center uppercase">S</div><button class="h-8 w-8 mx-auto flex items-center justify-center text-sm rounded-full hover:bg-slate-200">1</button><button class="h-8 w-8 mx-auto flex items-center justify-center text-sm rounded-full hover:bg-slate-200">2</button><button class="h-8 w-8 mx-auto flex items-center justify-center text-sm rounded-full hover:bg-slate-200">3</button><button class="h-8 w-8 mx-auto flex items-center justify-center text-sm rounded-full hover:bg-slate-200">4</button><button class="h-8 w-8 mx-auto flex items-center justify-center text-sm rounded-full bg-primary text-white font-medium">5</button><button class="h-8 w-8 mx-auto flex items-center justify-center text-sm rounded-full hover:bg-slate-200">6</button><button class="h-8 w-8 mx-auto flex items-center justify-center text-sm rounded-full hover:bg-slate-200">7</button><button class="h-8 w-8 mx-auto flex items-center justify-center text-sm rounded-full hover:bg-slate-200">8</button></div>
</div>
</div>
<!-- Modal Footer -->
<div class="px-6 py-4 bg-slate-50 dark:bg-slate-900/50 border-t border-slate-100 dark:border-slate-800 flex items-center justify-end gap-3" style="background-color: #FFFFFF; border-top-color: #CCCCCC;">
<button class="px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-400 border border-slate-300 dark:border-slate-700 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" style="color: #444444; border-color: #CCCCCC;">Cancelar</button>
<button class="px-4 py-2 text-sm font-medium text-white bg-primary rounded-lg hover:bg-primary/90 shadow-sm transition-colors" style="background-color: #2E75B6; color: #FFFFFF;">Guardar Tarea</button>
</div>
</div>
</div>
</body></html>
