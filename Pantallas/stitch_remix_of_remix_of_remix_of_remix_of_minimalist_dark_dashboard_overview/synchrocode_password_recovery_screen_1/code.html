<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SynchroCode - Recuperar contraseña</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2e77b8",
                        "background-light": "#f6f7f8",
                        "background-dark": "#13191f",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased h-screen w-full flex items-center justify-center overflow-hidden">
<div class="w-full max-w-[380px] px-4">
<!-- Card Container -->
<div class="bg-white dark:bg-slate-800 rounded-lg shadow-[0_1px_3px_0_rgba(0,0,0,0.1),0_1px_2px_0_rgba(0,0,0,0.06)] border border-slate-200 dark:border-slate-700 p-8">
<!-- Header Link -->
<a class="inline-flex items-center gap-1.5 text-sm font-medium text-slate-500 hover:text-primary dark:text-slate-400 dark:hover:text-primary mb-6 transition-colors duration-200" href="#">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
                Volver al login
            </a>
<!-- Title & Description -->
<div class="space-y-2 mb-6">
<h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">Recuperar contraseña</h1>
<p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed">
                    Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.
                </p>
</div>
<!-- Form -->
<form class="space-y-6" onsubmit="event.preventDefault();">
<div class="space-y-2">
<label class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70 text-slate-700 dark:text-slate-200" for="email">
                        Correo electrónico
                    </label>
<div class="relative">
<input class="flex h-10 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 dark:border-slate-700 dark:bg-slate-950 dark:ring-offset-slate-950 dark:placeholder:text-slate-400 transition-all duration-200" id="email" placeholder="you@example.com" type="email"/>
</div>
</div>
<button class="inline-flex h-10 w-full items-center justify-center whitespace-nowrap rounded-lg bg-primary px-4 py-2 text-sm font-medium text-white shadow transition-colors hover:bg-primary/90 focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50">
                    Enviar enlace
                </button>
</form>
</div>
<!-- Footer Links -->
<div class="mt-6 text-center text-xs text-slate-500 dark:text-slate-400">
<p>
                ¿No tienes una cuenta? 
                <a class="font-medium text-primary hover:underline" href="#">Regístrate</a>
</p>
</div>
</div>
</body></html>
