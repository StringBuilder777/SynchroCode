<!DOCTYPE html>
<html lang="es"><head>

<title>SynchroCode - Login</title>

<script>
        tailwind.config = {

            theme: {
                extend: {
                    colors: {
                        primary: "#2E75B6",
                        "primary-hover": "#245e92",
                        "background-light": "#F5F5F5",
                        "background-dark": "#09090b", // Zinc 950
                        "card-light": "#FFFFFF",
                        "card-dark": "#18181b", // Zinc 900
                        "border-light": "#e4e4e7", // Zinc 200
                        "border-dark": "#27272a", // Zinc 800
                        "text-main-light": "#18181b",
                        "text-main-dark": "#fafafa",
                        "text-muted-light": "#71717a",
                        "text-muted-dark": "#a1a1aa",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                        body: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.375rem", // rounded-md
                    },
                    boxShadow: {
                        'subtle': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                    }
                },
            },
        };

<style>
        body {
            font-family: 'Inter', sans-serif;
        }::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background-color: rgba(156, 163, 175, 0.5);
            border-radius: 20px;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-center p-4 transition-colors duration-300">
<div class="absolute top-4 right-4">
<button class="p-2 rounded-full text-text-muted-light dark:text-text-muted-dark hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors focus:outline-none focus:ring-2 focus:ring-primary" id="theme-toggle">
<i class="fas fa-moon dark:hidden"></i>
<i class="fas fa-sun hidden dark:block"></i>
</button>
</div>
<main class="w-full max-w-[400px] flex flex-col items-center justify-center min-h-[calc(100vh-2rem)]">
<div class="w-full space-y-6">
<div class="bg-card-light dark:bg-card-dark rounded-md shadow-subtle border border-border-light dark:border-border-dark p-8 transition-colors duration-300 w-full">
<div class="text-center mb-6">
<h1 class="text-2xl font-semibold text-text-main-light dark:text-text-main-dark tracking-tight">Iniciar sesión</h1>
<p class="text-sm text-text-muted-light dark:text-text-muted-dark mt-1">Inicia tu sesión colaborativa</p>
</div>
<form action="#" class="space-y-4" method="POST">
<div class="space-y-1">
<label class="block text-sm font-medium text-text-main-light dark:text-text-main-dark" for="email">Email</label>
<input class="w-full px-3 py-2 border border-border-light dark:border-border-dark bg-transparent rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-text-main-light dark:text-text-main-dark placeholder-gray-400 dark:placeholder-gray-600 transition-shadow text-sm" id="email" name="email" placeholder="you@example.com" type="email"/>
</div>
<div class="space-y-1">
<label class="block text-sm font-medium text-text-main-light dark:text-text-main-dark" for="password">Contraseña</label>
<input class="w-full px-3 py-2 border border-border-light dark:border-border-dark bg-transparent rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent text-text-main-light dark:text-text-main-dark placeholder-gray-400 dark:placeholder-gray-600 transition-shadow text-sm" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<button class="w-full bg-primary hover:bg-primary-hover text-white font-medium py-2 px-4 rounded-md focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors text-sm shadow-sm" type="submit">
                    Login
                </button>
<div class="text-center">
<a class="text-xs text-text-muted-light dark:text-text-muted-dark hover:text-primary dark:hover:text-primary transition-colors" href="#">
                        ¿Olvidaste tu contraseña?
                    </a>
</div>
</form>
<div class="relative my-6">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-border-light dark:border-border-dark"></span>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-card-light dark:bg-card-dark px-2 text-text-muted-light dark:text-text-muted-dark">
                        o continúa con
                    </span>
</div>
</div>
<button class="w-full flex items-center justify-center gap-2 bg-card-light dark:bg-card-dark border border-border-light dark:border-border-dark hover:bg-gray-50 dark:hover:bg-zinc-800 text-text-main-light dark:text-text-main-dark font-medium py-2 px-4 rounded-md transition-colors text-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-400 dark:focus:ring-gray-600" type="button">
<svg aria-hidden="true" class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24">
<path clip-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" fill-rule="evenodd"></path>
</svg>
                Continuar con GitHub
            </button>
</div>
<p class="text-center text-sm text-text-muted-light dark:text-text-muted-dark">
            Don't have an account? 
            <a class="font-medium text-primary hover:text-primary-hover underline-offset-4 hover:underline transition-colors" href="#">Sign up</a>
</p>
</div>
</main>
<script>
        const themeToggleBtn = document.getElementById('theme-toggle');
        // Check for saved user preference, if any, on load
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
        themeToggleBtn.addEventListener('click', function() {
            // if set via local storage previously
            if (localStorage.getItem('color-theme')) {
                if (localStorage.getItem('color-theme') === 'light') {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                }
            // if NOT set via local storage previously
            } else {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                }
            }
        });
    </script>
</body></html>
