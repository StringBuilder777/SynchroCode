<!DOCTYPE html>
<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SynchroCode User Activation</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2E75B6",
                        "background-light": "#F5F5F5",
                        "background-dark": "#09090b",
                        "card-dark": "#18181b",
                        "border-dark": "#27272a","input-dark": "#27272a",},
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.375rem",
                        "md": "0.375rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased text-slate-900 dark:text-zinc-50 min-h-screen flex flex-col transition-colors duration-200">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center p-4">
<div class="w-full max-w-[420px] bg-white dark:bg-card-dark rounded-md shadow-[0_2px_8px_rgba(0,0,0,0.05)] border border-slate-200 dark:border-border-dark p-8 flex flex-col gap-6">
<div class="flex flex-col gap-2 text-center sm:text-left">
<h1 class="text-slate-900 dark:text-zinc-50 text-2xl font-bold tracking-tight">Activa tu cuenta</h1>
<p class="text-slate-500 dark:text-zinc-400 text-sm leading-relaxed">
                    Hola Alejandro. Crea tu contraseña para comenzar.
                </p>
</div>
<div class="flex flex-col gap-4">
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-zinc-200 text-sm font-medium" for="email">Correo electrónico</label>
<div class="relative">
<input class="form-input flex w-full rounded-md border border-slate-200 bg-slate-50 dark:bg-input-dark/50 dark:border-zinc-700 px-3 py-2 text-sm text-slate-500 dark:text-zinc-300 shadow-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary disabled:opacity-100 disabled:cursor-not-allowed" id="email" readonly="" type="email" value="alejandro@synchrocode.com"/>
<span class="material-symbols-outlined absolute right-3 top-2.5 text-slate-400 dark:text-zinc-500 text-[20px]">lock</span>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-zinc-200 text-sm font-medium" for="password">Nueva contraseña</label>
<div class="relative">
<input class="form-input flex w-full rounded-md border border-slate-200 bg-white dark:bg-black/20 dark:border-zinc-700 px-3 py-2 text-sm text-slate-900 dark:text-zinc-50 placeholder:text-slate-400 dark:placeholder:text-zinc-500 shadow-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-zinc-200 text-sm font-medium" for="confirm-password">Confirmar contraseña</label>
<div class="relative">
<input class="form-input flex w-full rounded-md border border-slate-200 bg-white dark:bg-black/20 dark:border-zinc-700 px-3 py-2 text-sm text-slate-900 dark:text-zinc-50 placeholder:text-slate-400 dark:placeholder:text-zinc-500 shadow-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors" id="confirm-password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex flex-col gap-2 pt-1">
<div class="flex justify-between items-center">
<span class="text-xs font-medium text-slate-700 dark:text-zinc-300">Fortaleza de contraseña</span>
<span class="text-xs text-slate-500 dark:text-zinc-400">Media</span>
</div>
<div class="relative h-2 w-full overflow-hidden rounded-full bg-slate-100 dark:bg-zinc-800">
<div class="h-full w-[60%] flex-1 bg-primary transition-all" style="transform: translateX(0%);"></div>
</div>
</div>
</div>
<button class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium ring-offset-white dark:ring-offset-zinc-950 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-slate-950 dark:focus-visible:ring-zinc-300 focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-primary text-white hover:bg-primary/90 h-10 px-4 py-2 w-full mt-2 shadow-sm">
                Activar cuenta
            </button>
</div>
</div>

</body></html>
