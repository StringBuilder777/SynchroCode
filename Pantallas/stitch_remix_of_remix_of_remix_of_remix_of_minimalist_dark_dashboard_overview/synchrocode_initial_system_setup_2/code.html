<!DOCTYPE html>
<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SynchroCode Initial System Setup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2e75b8", // Blue #2E75B6 approx
                        "primary-hover": "#25629a",
                        "background-light": "#F5F5F5", // Updated to specific request
                        "background-dark": "#13191f",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.375rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen w-full flex items-center justify-center font-display antialiased text-slate-900 dark:text-slate-100 p-4">
<div class="w-full max-w-[460px] bg-white dark:bg-slate-800 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
<div class="pt-8 px-8 pb-4 flex flex-col items-center text-center">
<div class="inline-flex items-center rounded-full border border-orange-200 bg-orange-50 px-2.5 py-0.5 text-xs font-semibold text-orange-600 transition-colors focus:outline-none focus:ring-2 focus:ring-slate-400 focus:ring-offset-2 dark:border-orange-900 dark:bg-orange-900/30 dark:text-orange-400 mb-6">
                Configuración inicial
            </div>
<h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white mb-2">
                Crear cuenta de administrador
            </h1>
<p class="text-sm text-slate-500 dark:text-slate-400">
                Esta cuenta tendrá acceso completo al sistema.
            </p>
</div>
<div class="px-8 pb-8 pt-2">
<form class="space-y-4" onsubmit="event.preventDefault();">
<div class="space-y-2">
<label class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70 text-slate-900 dark:text-slate-200" for="name">
                        Nombre completo
                    </label>
<input class="flex h-10 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 dark:border-slate-600 dark:bg-slate-950 dark:ring-offset-slate-950 dark:placeholder:text-slate-400 dark:focus:ring-primary" id="name" placeholder="Ej: Carlos Mendoza" type="text"/>
</div>
<div class="space-y-2">
<label class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70 text-slate-900 dark:text-slate-200" for="email">
                        Correo electrónico
                    </label>
<input class="flex h-10 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 dark:border-slate-600 dark:bg-slate-950 dark:ring-offset-slate-950 dark:placeholder:text-slate-400 dark:focus:ring-primary" id="email" placeholder="Ej: admin@empresa.com" type="email"/>
</div>
<div class="space-y-2">
<label class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70 text-slate-900 dark:text-slate-200" for="password">
                        Contraseña
                    </label>
<div class="relative">
<input class="flex h-10 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 dark:border-slate-600 dark:bg-slate-950 dark:ring-offset-slate-950 dark:placeholder:text-slate-400 dark:focus:ring-primary" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
<span class="material-symbols-outlined text-[18px]">visibility_off</span>
</button>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between text-xs">
<span class="text-slate-500 dark:text-slate-400">Fortaleza de contraseña</span>
<span class="text-emerald-600 font-medium">Fuerte</span>
</div>
<div class="flex h-1.5 w-full overflow-hidden rounded-full bg-slate-100 dark:bg-slate-800 gap-1">
<div class="h-full w-1/4 bg-emerald-500 rounded-full"></div>
<div class="h-full w-1/4 bg-emerald-500 rounded-full"></div>
<div class="h-full w-1/4 bg-emerald-500 rounded-full"></div>
<div class="h-full w-1/4 bg-emerald-500/30 rounded-full"></div>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70 text-slate-900 dark:text-slate-200" for="confirm-password">
                        Confirmar contraseña
                    </label>
<input class="flex h-10 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 dark:border-slate-600 dark:bg-slate-950 dark:ring-offset-slate-950 dark:placeholder:text-slate-400 dark:focus:ring-primary" id="confirm-password" placeholder="••••••••" type="password"/>
</div>
<div class="pt-4">
<button class="inline-flex items-center justify-center whitespace-nowrap rounded-lg text-sm font-medium ring-offset-white transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-primary text-white hover:bg-primary-hover h-10 w-full shadow-sm">
                        Crear cuenta y continuar
                    </button>
</div>
</form>
</div>
</div>

</body></html>
